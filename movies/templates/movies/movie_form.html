{% extends 'movies/base.html' %}

{% block content %}
<h1>
{% if form.instance.pk %}
        Edit Movie
    {% else %}
        Add Movie
    {% endif %}    
</h1>

<form method="post" class="card p-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success">Save</button>
</form>
{% endblock %}
