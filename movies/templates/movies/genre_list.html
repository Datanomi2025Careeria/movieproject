{% extends 'movies/base.html' %}

{% block content %}
<h1>Genres</h1>

<a class="btn btn-primary mb-3" href="{% url 'genre_add' %}">Add Genre</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for g in genres %}
        <tr>
            <td>{{ g.name }}</td>
            <td>
                <a class="btn btn-warning btn-sm" href="{% url 'genre_edit' g.id %}">Edit</a>
                <a class="btn btn-danger btn-sm"
                href="{% url 'genre_delete' g.id %}"
                onclick="return confirm('Delete this genre? All movies in this genre will also be deleted.');">
                    Delete
                </a>                
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
