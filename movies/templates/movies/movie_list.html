{% extends 'movies/base.html' %}

{% block content %}
<h1>Movies</h1>

<a class="btn btn-primary mb-3" href="{% url 'movie_add' %}">Add Movie</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Title</th>
            <th>Year</th>
            <th>Genre</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for m in movies %}
        <tr>
            <td>{{ m.title }}</td>
            <td>{{ m.year }}</td>
            <td>{{ m.genre.name }}</td>
            <td>
                <a class="btn btn-warning btn-sm" href="{% url 'movie_edit' m.id %}">Edit</a>
                <a class="btn btn-danger btn-sm"
                href="{% url 'movie_delete' m.id %}"
                onclick="return confirm('Are you sure you want to delete this movie?');">
                    Delete
                </a>                
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
