{% extends 'movies/base.html' %}

{% block content %}
<h1>
{% if form.instance.pk %}
        Edit Genre
    {% else %}
        Add Genre
    {% endif %}

<form method="post" class="card p-3">

    {{ form.as_p }}

</form>
{% endblock %}
